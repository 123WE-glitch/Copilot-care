name: Frontend Quality Gate

on:
  pull_request:
    paths:
      - 'src/frontend/**'
      - 'src/shared/**'
      - '.github/workflows/frontend-quality-gate.yml'
      - 'package.json'
      - 'package-lock.json'
  push:
    branches:
      - main
      - master
    paths:
      - 'src/frontend/**'
      - 'src/shared/**'
      - '.github/workflows/frontend-quality-gate.yml'
      - 'package.json'
      - 'package-lock.json'

jobs:
  frontend-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Frontend typecheck
        run: npm run typecheck --workspace=@copilot-care/frontend

      - name: Frontend tests
        run: npm run test --workspace=@copilot-care/frontend

      - name: Frontend build
        run: npm run build --workspace=@copilot-care/frontend
